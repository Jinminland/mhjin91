<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Supabase Auth Test</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <h1>Supabase Auth Test</h1>

  <div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px;">
    <button onclick="signUp()">Sign Up</button>
    <button onclick="login()">Login</button>
    <button onclick="checkSession()">Check Session</button>
    <button onclick="logout()">Logout</button>
    <button onclick="clearLog()">Clear Log</button>
  </div>

  <pre id="out" style="white-space:pre-wrap; border:1px solid #ccc; padding:12px; min-height:240px;"></pre>

  <script>
    const client = window.supabase.createClient(
      "https://uqndklhxcdkoclknwohc.supabase.co",
      "sb_publishable_g-_XiNAsgDY9uw43XVzDAA_wWMSFpga"
    );

    const out = document.getElementById("out");

    function print(title, data) {
      out.textContent += `${title}\n${JSON.stringify(data, null, 2)}\n\n`;
      console.log(title, data);
    }

    function clearLog() {
      out.textContent = "";
    }

    async function signUp() {
      const email = prompt("Email");
      if (!email) return;

      const password = prompt("Password");
      if (!password) return;

      try {
        const res = await client.auth.signUp({ email, password });
        print("SIGN UP RESULT", res);

        if (res.error) {
          alert("Sign up failed: " + res.error.message);
          return;
        }

        alert("Sign up success");
      } catch (e) {
        alert("Sign up crashed: " + e.message);
      }
    }

    async function login() {
      const email = prompt("Email");
      if (!email) return;

      const password = prompt("Password");
      if (!password) return;

      try {
        const res = await client.auth.signInWithPassword({ email, password });
        print("LOGIN RESULT", res);

        if (res.error) {
          alert("Login failed: " + res.error.message);
          return;
        }

        alert("Login success");
      } catch (e) {
        alert("Login crashed: " + e.message);
      }
    }

    async function checkSession() {
      try {
        const res = await client.auth.getSession();
        print("SESSION RESULT", res);

        if (res.error) {
          alert("Check session failed: " + res.error.message);
          return;
        }

        if (res.data?.session) {
          alert("Session exists");
        } else {
          alert("No session");
        }
      } catch (e) {
        alert("Check session crashed: " + e.message);
      }
    }

    async function logout() {
      try {
        const res = await client.auth.signOut();
        print("LOGOUT RESULT", res);

        if (res.error) {
          alert("Logout failed: " + res.error.message);
          return;
        }

        alert("Logout success");
      } catch (e) {
        alert("Logout crashed: " + e.message);
      }
    }

    client.auth.onAuthStateChange((event, session) => {
      print("AUTH STATE CHANGED", { event, session });
    });
  </script>
</body>
</html>
