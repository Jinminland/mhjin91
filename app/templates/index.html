<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Supabase Load Test</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <h1>Supabase Load Test</h1>

  <button onclick="testSupabase()">Check Supabase</button>

  <script>
    function testSupabase() {
      if (!window.supabase) {
        alert("window.supabase is missing");
        return;
      }

      alert("window.supabase exists");
    }
  </script>
</body>
</html>
